apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-backend
  template:
    metadata:
      labels:
        app: ai-devops-backend
    spec:
      containers:
        - name: backend
          image: ai-devops-backend:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000

